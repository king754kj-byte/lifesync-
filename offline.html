<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LifeSync — Offline</title>
  <meta name="theme-color" content="#00e5ff" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #00d4ff;
      --green: #00e676;
      --bg: #050508;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: 'Syne', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
    }

    .icon {
      width: 88px;
      height: 88px;
      border-radius: 24px;
      background: linear-gradient(135deg, #00d4ff22, #00e67622);
      border: 1.5px solid rgba(0, 212, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 28px;
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); }
      50%       { box-shadow: 0 0 50px rgba(0, 212, 255, 0.4); }
    }

    .title {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #00d4ff, #00e676);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff9800;
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-text {
      font-size: 11px;
      color: #ff9800;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .retry-btn {
      width: 100%;
      padding: 14px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #00d4ff, #00e676);
      color: #000;
      font-size: 14px;
      font-weight: 800;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      letter-spacing: 0.5px;
      box-shadow: 0 0 24px rgba(0, 212, 255, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .retry-btn:active {
      transform: scale(0.97);
      box-shadow: 0 0 14px rgba(0, 212, 255, 0.3);
    }

    .hint {
      margin-top: 20px;
      font-size: 11px;
      color: #444;
      line-height: 1.5;
    }

    /* Ambient orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>

  <!-- Ambient background -->
  <div class="orb" style="width:300px;height:300px;background:#00d4ff;top:-80px;left:-80px;"></div>
  <div class="orb" style="width:250px;height:250px;background:#b44fff;bottom:-60px;right:-60px;"></div>

  <div class="container" style="position:relative;z-index:1;">
    <div class="icon">📡</div>

    <div class="title">You're Offline</div>
    <p class="subtitle">
      LifeSync needs a connection to load.<br>
      Your data is safe and will sync when you're back online.
    </p>

    <div class="status-row">
      <div class="status-dot"></div>
      <div class="status-text">No Internet Connection</div>
    </div>

    <button class="retry-btn" onclick="window.location.reload()">
      ↺ Try Again
    </button>

    <p class="hint">
      If you've used LifeSync before, try opening the app again —<br>
      cached content may be available.
    </p>
  </div>

  <script>
    // Auto-retry when connection restores
    window.addEventListener('online', () => {
      window.location.replace('./index.html');
    });
  </script>
</body>
</html>
