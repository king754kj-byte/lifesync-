<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1.0,
    viewport-fit=cover
  "
/>

<title>
  LifeSync — Offline
</title>

<link
  rel="preconnect"
  href="https://fonts.googleapis.com"
/>

<link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin
/>

<link
  href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap"
  rel="stylesheet"
/>

<style>

/* ═══════════════════════════════════════
   RESET
══════════════════════════════════════ */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --blue:#00d4ff;
  --purple:#b44fff;
  --green:#00e676;
  --orange:#ff9800;

  --bg:#050508;

  --safe-top:
    env(safe-area-inset-top,0px);

  --safe-bottom:
    env(safe-area-inset-bottom,0px);

}

html,
body{

  width:100%;
  height:100%;

  background:#000;

  overflow:hidden;

  font-family:
    'Syne',
    sans-serif;

  -webkit-user-select:none;
  user-select:none;

  -webkit-tap-highlight-color:
    transparent;

}

body{

  display:flex;
  align-items:center;
  justify-content:center;

  padding:
    calc(20px + var(--safe-top))
    20px
    calc(20px + var(--safe-bottom));

  position:relative;

}

/* ═══════════════════════════════════════
   BACKGROUND ORBS
══════════════════════════════════════ */

.orb{

  position:fixed;

  border-radius:50%;

  filter:blur(90px);

  opacity:0.12;

  pointer-events:none;

  z-index:0;

  animation:
    floatOrb 8s ease-in-out infinite;

}

@keyframes floatOrb{

  0%,100%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-20px);
  }

}

/* ═══════════════════════════════════════
   CARD
══════════════════════════════════════ */

.offline-card{

  position:relative;

  z-index:1;

  width:100%;
  max-width:360px;

  padding:40px 30px;

  border-radius:32px;

  background:
    rgba(255,255,255,0.04);

  border:
    1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(24px);

  text-align:center;

  overflow:hidden;

  box-shadow:
    0 0 60px rgba(0,212,255,0.12),
    0 30px 80px rgba(0,0,0,0.85);

  animation:
    cardIn .7s cubic-bezier(.34,1.56,.64,1);

}

@keyframes cardIn{

  from{

    opacity:0;

    transform:
      translateY(30px)
      scale(.94);

  }

  to{

    opacity:1;

    transform:
      translateY(0)
      scale(1);

  }

}

/* SHIMMER */

.offline-card::before{

  content:'';

  position:absolute;

  inset:0;

  background:
    linear-gradient(
      120deg,
      transparent,
      rgba(255,255,255,0.03),
      transparent
    );

  transform:translateX(-100%);

  animation:
    shimmer 5s linear infinite;

}

@keyframes shimmer{

  to{
    transform:translateX(100%);
  }

}

/* ═══════════════════════════════════════
   BRAND
══════════════════════════════════════ */

.brand-row{

  display:flex;

  align-items:center;
  justify-content:center;

  gap:10px;

  margin-bottom:24px;

}

.brand-dot{

  width:8px;
  height:8px;

  border-radius:50%;

  animation:
    blink 1.5s ease-in-out infinite;

}

@keyframes blink{

  0%,100%{
    opacity:.3;
  }

  50%{
    opacity:1;
  }

}

/* ═══════════════════════════════════════
   ICON
══════════════════════════════════════ */

.offline-icon-wrap{

  width:100px;
  height:100px;

  margin:0 auto 24px;

  border-radius:30px;

  display:flex;

  align-items:center;
  justify-content:center;

  background:
    linear-gradient(
      135deg,
      rgba(0,212,255,0.12),
      rgba(180,79,255,0.12)
    );

  border:
    1px solid rgba(0,212,255,0.25);

  box-shadow:
    0 0 30px rgba(0,212,255,0.2);

  animation:
    pulse 2.5s ease-in-out infinite;

}

@keyframes pulse{

  0%,100%{

    transform:scale(1);

    box-shadow:
      0 0 24px rgba(0,212,255,0.2);

  }

  50%{

    transform:scale(1.05);

    box-shadow:
      0 0 50px rgba(0,212,255,0.35);

  }

}

.offline-icon{

  font-size:46px;

  animation:
    wifiPulse 2s ease-in-out infinite;

}

@keyframes wifiPulse{

  0%,100%{
    opacity:.7;
  }

  50%{
    opacity:1;
  }

}

/* ═══════════════════════════════════════
   BADGE
══════════════════════════════════════ */

.offline-badge{

  display:inline-flex;

  align-items:center;
  gap:6px;

  padding:6px 14px;

  border-radius:99px;

  background:
    rgba(255,152,0,0.12);

  border:
    1px solid rgba(255,152,0,0.35);

  color:var(--orange);

  font-size:11px;
  font-weight:800;

  margin-bottom:18px;

}

.badge-dot{

  width:6px;
  height:6px;

  border-radius:50%;

  background:var(--orange);

  animation:
    blink 1s infinite;

}

/* ═══════════════════════════════════════
   TEXT
══════════════════════════════════════ */

h1{

  font-size:28px;

  font-weight:900;

  color:#fff;

  margin-bottom:10px;

}

.gradient{

  background:
    linear-gradient(
      135deg,
      var(--blue),
      var(--purple)
    );

  -webkit-background-clip:text;

  -webkit-text-fill-color:
    transparent;

}

.offline-sub{

  font-size:13px;

  color:#888;

  line-height:1.7;

  margin-bottom:24px;

}

/* ═══════════════════════════════════════
   CLOCK
══════════════════════════════════════ */

#offline-clock{

  color:var(--blue);

  font-size:14px;

  font-weight:700;

  margin-bottom:18px;

}

/* ═══════════════════════════════════════
   FEATURES
══════════════════════════════════════ */

.feature-row{

  display:flex;

  flex-wrap:wrap;

  gap:8px;

  justify-content:center;

  margin-bottom:28px;

}

.feature-pill{

  padding:6px 12px;

  border-radius:99px;

  font-size:11px;

  font-weight:700;

  border:
    1px solid rgba(255,255,255,0.08);

  color:#aaa;

  background:
    rgba(255,255,255,0.03);

}

.feature-pill.ok{

  color:var(--green);

  background:
    rgba(0,230,118,0.08);

  border:
    1px solid rgba(0,230,118,0.22);

}

/* ═══════════════════════════════════════
   BUTTON
══════════════════════════════════════ */

.retry-btn{

  width:100%;

  border:none;

  border-radius:18px;

  padding:15px 20px;

  font-family:inherit;

  font-size:14px;
  font-weight:800;

  color:#fff;

  cursor:pointer;

  display:flex;

  align-items:center;
  justify-content:center;

  gap:10px;

  background:
    linear-gradient(
      135deg,
      var(--blue),
      var(--purple)
    );

  box-shadow:
    0 0 25px rgba(0,212,255,0.35);

  transition:
    transform .2s ease,
    opacity .2s ease;

}

.retry-btn:active{

  transform:scale(.95);

}

.retry-spin{

  animation:
    spin 1s linear infinite;

}

@keyframes spin{

  to{
    transform:rotate(360deg);
  }

}

/* ═══════════════════════════════════════
   CACHE NOTE
══════════════════════════════════════ */

.cached-note{

  margin-top:16px;

  font-size:11px;

  color:#555;

  line-height:1.6;

}

/* ═══════════════════════════════════════
   BAR
══════════════════════════════════════ */

.reconnect-wrap{

  width:100%;

  height:4px;

  border-radius:99px;

  overflow:hidden;

  margin-top:24px;

  background:
    rgba(255,255,255,0.05);

}

.reconnect-bar{

  width:0%;

  height:100%;

  border-radius:99px;

  background:
    linear-gradient(
      90deg,
      var(--blue),
      var(--purple)
    );

  animation:
    loading 4s infinite;

}

@keyframes loading{

  0%{
    width:0%;
  }

  70%{
    width:100%;
  }

  100%{
    width:100%;
    opacity:0;
  }

}

</style>

</head>

<body>

<!-- ORBS -->

<div
  class="orb"
  style="
    width:260px;
    height:260px;
    background:#00d4ff;
    top:-80px;
    left:-80px;
  "
></div>

<div
  class="orb"
  style="
    width:220px;
    height:220px;
    background:#b44fff;
    bottom:-70px;
    right:-70px;
  "
></div>

<!-- CARD -->

<div class="offline-card">

  <!-- BRAND -->

  <div class="brand-row">

    <div
      class="brand-dot"
      style="background:#00d4ff;"
    ></div>

    <div style="
      color:#555;
      font-size:13px;
      font-weight:800;
      letter-spacing:2px;
    ">
      LIFESYNC
    </div>

    <div
      class="brand-dot"
      style="
        background:#b44fff;
        animation-delay:.5s;
      "
    ></div>

  </div>

  <!-- ICON -->

  <div class="offline-icon-wrap">

    <div class="offline-icon">
      📡
    </div>

  </div>

  <!-- BADGE -->

  <div class="offline-badge">

    <div class="badge-dot"></div>

    OFFLINE MODE

  </div>

  <!-- TITLE -->

  <h1>

    You're
    <span class="gradient">
      Offline
    </span>

  </h1>

  <p class="offline-sub">

    No internet connection detected.
    Your reminders, habits,
    notes and cached data
    still work offline.

  </p>

  <!-- CLOCK -->

  <div id="offline-clock"></div>

  <!-- FEATURES -->

  <div class="feature-row">

    <div class="feature-pill ok">
      ✓ Reminders
    </div>

    <div class="feature-pill ok">
      ✓ Habits
    </div>

    <div class="feature-pill ok">
      ✓ Notes
    </div>

    <div class="feature-pill ok">
      ✓ Expenses
    </div>

    <div class="feature-pill">
      📡 Weather
    </div>

    <div class="feature-pill">
      🤖 AI
    </div>

  </div>

  <!-- BUTTON -->

  <button
    class="retry-btn"
    onclick="retryConnection(this)"
  >

    <span id="retry-icon">
      🔄
    </span>

    Try Again

  </button>

  <!-- NOTE -->

  <p class="cached-note">

    All your data is saved locally
    and syncs automatically when
    internet comes back.

  </p>

  <!-- BAR -->

  <div class="reconnect-wrap">

    <div class="reconnect-bar"></div>

  </div>

</div>

<script>

// ═══════════════════════════════
// CLOCK
// ═══════════════════════════════

function updateClock(){

  const el =
    document.getElementById(
      'offline-clock'
    );

  if (!el) return;

  el.textContent =
    new Date().toLocaleTimeString([],{

      hour:'2-digit',
      minute:'2-digit'

    });

}

setInterval(
  updateClock,
  1000
);

updateClock();

// ═══════════════════════════════
// REAL INTERNET CHECK
// ═══════════════════════════════

async function checkInternet(){

  try{

    await fetch('./index.html',{

      method:'HEAD',
      cache:'no-store'

    });

    return true;

  }catch{

    return false;

  }

}

// ═══════════════════════════════
// RETRY
// ═══════════════════════════════

async function retryConnection(btn){

  const icon =
    document.getElementById(
      'retry-icon'
    );

  icon.classList.add(
    'retry-spin'
  );

  btn.disabled = true;

  btn.style.opacity = '.7';

  const connected =
    await checkInternet();

  if(connected){

    location.href =
      './index.html';

    return;

  }

  icon.classList.remove(
    'retry-spin'
  );

  btn.disabled = false;

  btn.style.opacity = '';

  showToast(
    '❌ Still Offline'
  );

}

// ═══════════════════════════════
// AUTO RETRY
// ═══════════════════════════════

setInterval(async()=>{

  const connected =
    await checkInternet();

  if(connected){

    location.href =
      './index.html';

  }

},8000);

// ═══════════════════════════════
// TOAST
// ═══════════════════════════════

function showToast(text){

  const toast =
    document.createElement('div');

  toast.textContent = text;

  toast.style.cssText = `

    position:fixed;
    bottom:30px;
    left:50%;

    transform:translateX(-50%);

    background:
      rgba(255,45,120,0.12);

    border:
      1px solid rgba(255,45,120,0.3);

    color:#fff;

    padding:12px 18px;

    border-radius:16px;

    backdrop-filter:blur(18px);

    font-size:13px;
    font-weight:700;

    z-index:99999;

  `;

  document.body.appendChild(
    toast
  );

  setTimeout(()=>{

    toast.remove();

  },2500);

}

// ═══════════════════════════════
// ONLINE EVENT
// ═══════════════════════════════

window.addEventListener(
  'online',
  ()=>{

    location.href =
      './index.html';

  }
);

// ═══════════════════════════════
// AMOLED
// ═══════════════════════════════

if(

  localStorage.getItem(
    'lifesync_amoled'
  ) === 'true'

){

  document.body.style.background =
    '#000';

}

console.log(
  '📴 LifeSync Offline V2.2 Ready'
);

</script>

</body>
</html>
