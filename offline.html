<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>LifeSync — Offline</title>
<meta name="theme-color" content="#000000" />
<link rel="manifest" href="./manifest.json" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap');

  :root {
    --blue:   #00d4ff;
    --purple: #b44fff;
    --cyan:   #00fff7;
    --green:  #00e676;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Syne', system-ui, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    overflow: hidden;
  }

  /* Ambient background orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    pointer-events: none;
    animation: pulse 6s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { transform: scale(1);   opacity: 0.12; }
    to   { transform: scale(1.2); opacity: 0.20; }
  }

  .container {
    position: relative;
    z-index: 10;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    text-align: center;
    gap: 24px;
  }

  .icon-wrap {
    width: 96px;
    height: 96px;
    border-radius: 28px;
    background: linear-gradient(135deg, #00d4ff22, #b44fff22);
    border: 1px solid rgba(0, 212, 255, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    animation: iconFloat 3s ease-in-out infinite alternate;
  }
  @keyframes iconFloat {
    from { transform: translateY(0px); }
    to   { transform: translateY(-8px); }
  }

  h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }

  p {
    font-size: 14px;
    color: #888;
    line-height: 1.6;
    max-width: 280px;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 99px;
    padding: 10px 20px;
    font-size: 13px;
    color: #aaa;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ff4444;
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  .btn-retry {
    padding: 14px 36px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(0, 212, 255, 0.3);
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-retry:active {
    transform: scale(0.96);
    box-shadow: 0 2px 12px rgba(0, 212, 255, 0.2);
  }

  .cached-note {
    font-size: 11px;
    color: #444;
    max-width: 260px;
    line-height: 1.5;
  }

  /* Online indicator — hidden by default, shown when back online */
  #online-banner {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: linear-gradient(135deg, #00e676, #00d4ff);
    color: #000;
    font-weight: 800;
    font-size: 13px;
    text-align: center;
    padding: 14px;
    transform: translateY(-100%);
    transition: transform 0.3s ease;
    z-index: 100;
  }
  #online-banner.show { transform: translateY(0); }
</style>
</head>
<body>

<!-- Ambient orbs -->
<div class="orb" style="left:-60px;top:-60px;width:280px;height:280px;background:var(--blue);animation-delay:0s;"></div>
<div class="orb" style="right:-60px;bottom:100px;width:220px;height:220px;background:var(--purple);animation-delay:2s;"></div>
<div class="orb" style="left:50%;bottom:-40px;width:180px;height:180px;background:var(--green);animation-delay:4s;transform:translateX(-50%);"></div>

<div id="online-banner">✅ Back online! Reloading LifeSync…</div>

<div class="container">

  <div class="icon-wrap">📡</div>

  <h1>You're Offline</h1>

  <p>No internet connection detected. LifeSync needs connectivity to sync your data and load the app.</p>

  <div class="status-row">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">No connection</span>
  </div>

  <button class="btn-retry" onclick="retryConnection()">
    🔄 Try Again
  </button>

  <p class="cached-note">
    If you've used LifeSync before, try opening the app normally — your cached data may still be available.
  </p>

</div>

<script>
  function retryConnection() {
    if (navigator.onLine) {
      window.location.href = './index.html';
    } else {
      // Visual feedback
      const btn = document.querySelector('.btn-retry');
      btn.textContent = '⏳ Still offline…';
      btn.style.opacity = '0.6';
      setTimeout(() => {
        btn.textContent = '🔄 Try Again';
        btn.style.opacity = '1';
      }, 2000);
    }
  }

  // Auto-redirect when connection is restored
  window.addEventListener('online', () => {
    document.getElementById('online-banner').classList.add('show');
    document.getElementById('status-dot').style.background = '#00e676';
    document.getElementById('status-text').textContent = 'Back online!';
    setTimeout(() => { window.location.href = './index.html'; }, 1500);
  });

  window.addEventListener('offline', () => {
    document.getElementById('status-dot').style.background = '#ff4444';
    document.getElementById('status-text').textContent = 'No connection';
  });

  // If already online somehow, redirect immediately
  if (navigator.onLine) {
    window.location.href = './index.html';
  }
</script>

</body>
</html>
