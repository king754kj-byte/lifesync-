<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>LifeSync — Offline</title>
<meta name="theme-color" content="#00e5ff" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:   #00d4ff;
    --green:  #00e676;
    --purple: #b44fff;
    --bg:     #050508;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Syne', system-ui, sans-serif;
    color: #fff;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 32px 24px env(safe-area-inset-bottom, 0px);
    text-align: center;
    position: relative;
  }

  /* Ambient orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    pointer-events: none;
    animation: orbPulse 6s ease-in-out infinite;
  }
  .orb-1 { width: 300px; height: 300px; background: var(--blue);   top: -80px;  left: -80px;  animation-delay: 0s; }
  .orb-2 { width: 250px; height: 250px; background: var(--purple); top: 200px;  right: -60px; animation-delay: 2s; }
  .orb-3 { width: 200px; height: 200px; background: var(--green);  bottom: -60px; left: 50px; animation-delay: 4s; }

  @keyframes orbPulse {
    0%,100% { opacity: 0.10; transform: scale(1); }
    50%      { opacity: 0.18; transform: scale(1.08); }
  }

  .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 20px; }

  .icon-wrap {
    width: 90px;
    height: 90px;
    border-radius: 26px;
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(180,79,255,0.15));
    border: 1px solid rgba(0,212,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    box-shadow: 0 0 40px rgba(0,212,255,0.2);
    animation: iconPulse 2.5s ease-in-out infinite;
  }

  @keyframes iconPulse {
    0%,100% { box-shadow: 0 0 30px rgba(0,212,255,0.15); }
    50%      { box-shadow: 0 0 55px rgba(0,212,255,0.35); }
  }

  .brand {
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(135deg, #00d4ff, #00e676);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
  }

  .headline {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    margin-bottom: -8px;
  }

  .body-text {
    font-size: 13px;
    color: #666;
    line-height: 1.6;
    max-width: 280px;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.4), transparent);
    margin: 4px 0;
  }

  .cached-note {
    font-size: 11px;
    color: #444;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .cached-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ffb300;
    box-shadow: 0 0 6px #ffb300;
    animation: dotBlink 1.6s ease-in-out infinite;
  }
  @keyframes dotBlink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.2; }
  }

  .retry-btn {
    margin-top: 8px;
    padding: 12px 32px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #00d4ff, #b44fff);
    color: #fff;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.5px;
    box-shadow: 0 0 24px rgba(0,212,255,0.3);
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .retry-btn:active { transform: scale(0.92); }
  .retry-btn:hover  { box-shadow: 0 0 36px rgba(0,212,255,0.5); }

  .version-tag {
    position: fixed;
    bottom: calc(16px + env(safe-area-inset-bottom, 0px));
    font-size: 10px;
    color: #333;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="content">
    <div class="icon-wrap">📡</div>

    <div class="brand">LifeSync</div>

    <div class="headline">You're offline</div>
    <div class="body-text">
      No internet connection detected.<br>
      Cached data is available — reconnect to sync.
    </div>

    <div class="divider"></div>

    <div class="cached-note">
      <span class="cached-dot"></span>
      Cached app data is ready
    </div>

    <button class="retry-btn" onclick="retry()">↺ Try Again</button>
  </div>

  <div class="version-tag">LifeSync v6.0</div>

  <script>
    function retry() {
      // If we're back online, go to the main app
      if (navigator.onLine) {
        window.location.href = './index.html';
      } else {
        window.location.reload();
      }
    }

    // Auto-redirect when connection restores
    window.addEventListener('online', () => {
      setTimeout(() => { window.location.href = './index.html'; }, 800);
    });
  </script>
</body>
</html>
