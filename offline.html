<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>LifeSync — Offline</title>
<meta name="theme-color" content="#00e5ff" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:   #00d4ff;
    --green:  #00e676;
    --bg:     #050508;
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: #fff;
    font-family: 'Syne', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: calc(20px + var(--safe-top)) 24px calc(20px + var(--safe-bottom));
    text-align: center;
    overflow: hidden;
    position: relative;
  }

  /* ambient orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }

  .content { position: relative; z-index: 1; max-width: 320px; width: 100%; }

  /* Icon pulse */
  .icon-wrap {
    width: 96px;
    height: 96px;
    border-radius: 28px;
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,230,118,0.1));
    border: 1px solid rgba(0,212,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    margin: 0 auto 28px;
    animation: pulse 2.4s ease-in-out infinite;
    box-shadow: 0 0 40px rgba(0,212,255,0.2);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 30px rgba(0,212,255,0.2), 0 0 0 0 rgba(0,212,255,0); }
    50%       { box-shadow: 0 0 50px rgba(0,212,255,0.35), 0 0 0 12px rgba(0,212,255,0.06); }
  }

  h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--blue), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  p {
    font-size: 13px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 36px;
  }

  .retry-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 13px 28px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--blue), var(--green));
    color: #000;
    font-size: 13px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 0 20px rgba(0,212,255,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .retry-btn:active { transform: scale(0.95); }

  .status-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 32px;
    font-size: 11px;
    color: #444;
    letter-spacing: 0.5px;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ff6d00;
    animation: blink 1.6s ease-in-out infinite;
    box-shadow: 0 0 8px #ff6d00;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  .version {
    position: fixed;
    bottom: calc(14px + var(--safe-bottom));
    left: 0; right: 0;
    text-align: center;
    font-size: 10px;
    color: #2a2a2a;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<!-- Ambient orbs -->
<div class="orb" style="width:300px;height:300px;top:-80px;left:-80px;background:#00d4ff;"></div>
<div class="orb" style="width:250px;height:250px;bottom:-60px;right:-60px;background:#00e676;"></div>

<div class="content">
  <div class="icon-wrap">📡</div>

  <h1>You're Offline</h1>
  <p>
    LifeSync can't reach the internet right now.<br>
    Your cached data is still available.<br>
    Connect to Wi-Fi or mobile data and try again.
  </p>

  <button class="retry-btn" onclick="retryConnection()">
    <span>↻</span> Try Again
  </button>

  <div class="status-row">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">No connection</span>
  </div>
</div>

<div class="version">LifeSync v5.8</div>

<script>
  function retryConnection() {
    if (navigator.onLine) {
      window.location.href = './index.html';
    } else {
      const btn = document.querySelector('.retry-btn');
      btn.textContent = '📡 Still offline…';
      setTimeout(function() {
        btn.innerHTML = '<span>↻</span> Try Again';
      }, 2000);
    }
  }

  window.addEventListener('online', function() {
    document.getElementById('status-dot').style.background = '#00e676';
    document.getElementById('status-dot').style.boxShadow = '0 0 8px #00e676';
    document.getElementById('status-text').textContent = 'Back online! Redirecting…';
    document.getElementById('status-text').style.color = '#00e676';
    setTimeout(function() {
      window.location.href = './index.html';
    }, 800);
  });

  window.addEventListener('offline', function() {
    document.getElementById('status-dot').style.background = '#ff6d00';
    document.getElementById('status-dot').style.boxShadow = '0 0 8px #ff6d00';
    document.getElementById('status-text').textContent = 'No connection';
    document.getElementById('status-text').style.color = '';
  });
</script>
</body>
</html>
