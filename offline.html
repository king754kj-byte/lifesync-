<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>LifeSync — Offline</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --blue:#00d4ff;--purple:#b44fff;--cyan:#00fff7;--green:#00e676;--bg:#050508;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body {
    height:100%; background:#000;
    font-family:'Syne',sans-serif;
    -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
    overflow:hidden;
  }
  body {
    display:flex; align-items:center; justify-content:center;
    padding: calc(20px + var(--safe-top)) 20px calc(20px + var(--safe-bottom));
  }

  /* Background orbs */
  .orb {
    position:fixed; border-radius:50%;
    opacity:0.12; filter:blur(80px); pointer-events:none; z-index:0;
  }

  /* Main card */
  .offline-card {
    position:relative; z-index:1;
    width:100%; max-width:360px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.09);
    border-radius:32px;
    padding:40px 32px 36px;
    backdrop-filter:blur(20px);
    text-align:center;
    box-shadow:0 0 60px rgba(0,212,255,0.12), 0 40px 80px rgba(0,0,0,0.8);
    animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  @keyframes cardIn {
    from { transform:translateY(30px) scale(0.95); opacity:0; }
    to   { transform:translateY(0)    scale(1);    opacity:1; }
  }

  /* Animated wifi icon */
  .offline-icon-wrap {
    width:96px; height:96px;
    margin:0 auto 24px;
    border-radius:28px;
    background:linear-gradient(135deg,rgba(0,212,255,0.12),rgba(180,79,255,0.12));
    border:1.5px solid rgba(0,212,255,0.25);
    display:flex; align-items:center; justify-content:center;
    position:relative;
    animation:iconPulse 2.5s ease-in-out infinite;
    box-shadow:0 0 30px rgba(0,212,255,0.2), 0 0 60px rgba(0,212,255,0.08);
  }

  @keyframes iconPulse {
    0%,100%{ box-shadow:0 0 20px rgba(0,212,255,0.2), 0 0 40px rgba(0,212,255,0.08); }
    50%    { box-shadow:0 0 40px rgba(0,212,255,0.4), 0 0 80px rgba(0,212,255,0.15); }
  }

  .offline-icon-svg {
    font-size:44px;
    animation:wifiPulse 2s ease-in-out infinite;
  }

  @keyframes wifiPulse {
    0%,100%{ opacity:0.7; transform:scale(1); }
    50%    { opacity:1;   transform:scale(1.08); }
  }

  /* Neon badge */
  .offline-badge {
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 14px; border-radius:99px;
    background:rgba(255,152,0,0.12);
    border:1px solid rgba(255,152,0,0.35);
    color:#ff9800; font-size:11px; font-weight:800;
    letter-spacing:0.5px; margin-bottom:20px;
    animation:badgeBlink 2s ease-in-out infinite;
  }

  @keyframes badgeBlink {
    0%,100%{ opacity:1; }
    50%    { opacity:0.65; }
  }

  .offline-badge-dot {
    width:6px; height:6px; border-radius:50%;
    background:#ff9800;
    animation:dotBlink 1s ease-in-out infinite;
  }

  @keyframes dotBlink {
    0%,100%{ opacity:1; }
    50%    { opacity:0.2; }
  }

  h1 {
    font-size:26px; font-weight:900; color:#fff;
    letter-spacing:-0.5px; margin-bottom:10px;
  }

  h1 span {
    background:linear-gradient(135deg,#00d4ff,#b44fff);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }

  .offline-sub {
    font-size:13px; color:#888; line-height:1.6; margin-bottom:28px;
  }

  /* Feature pills */
  .feature-row {
    display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
    margin-bottom:28px;
  }

  .feature-pill {
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 12px; border-radius:99px;
    background:rgba(0,212,255,0.07);
    border:1px solid rgba(0,212,255,0.18);
    color:#aaa; font-size:11px; font-weight:700;
  }

  .feature-pill.ok {
    background:rgba(0,230,118,0.08);
    border-color:rgba(0,230,118,0.25);
    color:#00e676;
  }

  /* Retry button */
  .retry-btn {
    display:inline-flex; align-items:center; gap:8px;
    padding:14px 28px; border-radius:16px; border:none;
    background:linear-gradient(135deg,#00d4ff,#b44fff);
    color:#fff; font-size:14px; font-weight:800;
    cursor:pointer; font-family:inherit;
    box-shadow:0 0 24px rgba(0,212,255,0.45), 0 4px 16px rgba(0,0,0,0.5);
    transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
    margin-bottom:16px;
    width:100%;
    justify-content:center;
  }

  .retry-btn:active {
    transform:scale(0.95);
    box-shadow:0 0 12px rgba(0,212,255,0.3), 0 2px 8px rgba(0,0,0,0.4);
  }

  .retry-spin {
    display:inline-block;
    animation:spin 1s linear infinite;
  }

  @keyframes spin { to { transform:rotate(360deg); } }

  .cached-note {
    font-size:11px; color:#444; line-height:1.6;
  }

  /* Progress bar (animated) */
  .reconnect-bar-wrap {
    width:100%; height:3px;
    background:rgba(255,255,255,0.06);
    border-radius:99px; overflow:hidden; margin-top:24px;
  }
  .reconnect-bar {
    height:100%; width:0%; border-radius:99px;
    background:linear-gradient(90deg,#00d4ff,#b44fff);
    box-shadow:0 0 8px rgba(0,212,255,0.6);
    animation:barPing 4s ease-in-out infinite;
  }
  @keyframes barPing {
    0%   { width:0%;   opacity:1; }
    70%  { width:100%; opacity:1; }
    100% { width:100%; opacity:0; }
  }

  /* Splash / branding at top */
  .brand-row {
    display:flex; align-items:center; justify-content:center;
    gap:10px; margin-bottom:24px;
  }
  .brand-dot {
    width:8px; height:8px; border-radius:50%;
    animation:brandBlink 1.5s ease-in-out infinite;
  }
  @keyframes brandBlink {
    0%,100%{ opacity:0.3; } 50%{ opacity:1; }
  }
</style>
</head>
<body>

<!-- Background orbs -->
<div class="orb" style="left:-60px;top:-40px;width:280px;height:280px;background:#00d4ff;"></div>
<div class="orb" style="right:-40px;top:120px;width:220px;height:220px;background:#b44fff;"></div>
<div class="orb" style="left:40px;bottom:-60px;width:200px;height:200px;background:#00e676;opacity:0.08;"></div>

<div class="offline-card">

  <!-- Brand row -->
  <div class="brand-row">
    <div class="brand-dot" style="background:#00d4ff;animation-delay:0s;"></div>
    <div style="font-size:13px;font-weight:800;color:#555;letter-spacing:2px;">LIFESYNC</div>
    <div class="brand-dot" style="background:#b44fff;animation-delay:0.5s;"></div>
  </div>

  <!-- Animated icon -->
  <div class="offline-icon-wrap">
    <span class="offline-icon-svg">📡</span>
  </div>

  <!-- Status badge -->
  <div class="offline-badge">
    <div class="offline-badge-dot"></div>
    OFFLINE MODE
  </div>

  <!-- Heading -->
  <h1>You're <span>Offline</span></h1>
  <p class="offline-sub">
    No internet connection detected.<br>
    Your cached data is still available — all your reminders, notes, and habits work offline.
  </p>

  <!-- What works offline -->
  <div class="feature-row">
    <span class="feature-pill ok">✓ Reminders</span>
    <span class="feature-pill ok">✓ Habits</span>
    <span class="feature-pill ok">✓ Notes</span>
    <span class="feature-pill ok">✓ Expenses</span>
    <span class="feature-pill">📡 Weather</span>
    <span class="feature-pill">🤖 AI Chat</span>
  </div>

  <!-- Retry button -->
  <button class="retry-btn" onclick="retryConnection(this)">
    <span id="retry-icon">🔄</span>
    Try Again
  </button>

  <p class="cached-note">
    All your data is saved locally and syncs when you're back online.
  </p>

  <!-- Progress bar -->
  <div class="reconnect-bar-wrap">
    <div class="reconnect-bar"></div>
  </div>

</div>

<script>
  function retryConnection(btn) {
    const icon = document.getElementById('retry-icon');
    icon.classList.add('retry-spin');
    btn.disabled = true;
    btn.style.opacity = '0.75';

    // Check online status
    setTimeout(() => {
      if (navigator.onLine) {
        window.location.href = './index.html';
      } else {
        icon.classList.remove('retry-spin');
        btn.disabled = false;
        btn.style.opacity = '';

        // Quick shake animation
        btn.style.animation = 'none';
        btn.style.transform = 'translateX(-4px)';
        setTimeout(() => { btn.style.transform = 'translateX(4px)'; }, 80);
        setTimeout(() => { btn.style.transform = ''; }, 160);
      }
    }, 1200);
  }

  // Auto-retry when connection restored
  window.addEventListener('online', () => {
    window.location.href = './index.html';
  });

  // Ping check every 10 seconds
  setInterval(() => {
    if (navigator.onLine) window.location.href = './index.html';
  }, 10000);
</script>

</body>
</html>
